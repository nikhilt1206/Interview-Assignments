<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Broken Link & Broken Image Practice</title>
</head>
<body>
    <h1>Welcome to My Webpage</h1>

    <ul>
        <li><a href="https://www.google.com" target="_blank">Google</a></li>
        <li><a href="https://www.youtube.com" target="_blank">YouTube</a></li>
        <li><a href="https://www.linkedin.com" target="_blank">LinkedIn</a></li>
        <li><a href="https://www.wikipedia.org" target="_blank">Wikipedia</a></li>

        <!-- Broken links -->
        <li><a href="https://www.thispagedoesnotexist123456.com" target="_blank">Broken Link 1</a></li>
        <li><a href="http://brokenlink.example.com" target="_blank">Broken Link 2</a></li>
        <li><a href="https://invalid-domain-for-testing-987654.com" target="_blank">Broken Link 3</a></li>
    </ul>

    <h2>Images</h2>

    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/React-icon.svg/512px-React-icon.svg.png"
         alt="Valid Image" width="150">

    <!-- Broken image -->
    <img src="https://example.com/images/nonexistent-image-12345.png"
         alt="Broken Image" width="150">

</body>
</html>
